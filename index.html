<!-- Floating AI Chatbot Widget -->
<button id="openChatbotBtn" class="floating-ai-button" type="button">
  <span class="ai-icon">🤖</span>
  <span class="ai-text">Ask Ramya AI</span>
</button>

<div class="chatbot-popup" id="chatbotPopup">
  <div class="chatbot-header">
    <span>Ramya AI Assistant</span>
    <button id="closeChatbotBtn" type="button">×</button>
  </div>

  <iframe 
    src="https://ramya-ai.onrender.com" 
    class="chatbot-frame"
    title="Ramya AI Portfolio Assistant">
  </iframe>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const openBtn = document.getElementById("openChatbotBtn");
    const closeBtn = document.getElementById("closeChatbotBtn");
    const chatbot = document.getElementById("chatbotPopup");

    openBtn.addEventListener("click", function () {
      chatbot.classList.toggle("show-chatbot");
    });

    closeBtn.addEventListener("click", function () {
      chatbot.classList.remove("show-chatbot");
    });
  });
</script>
